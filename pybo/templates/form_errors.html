{% if form.errors %}
    {% for field, errors in form.errors.items() %}  
        <div class="alert alert-danger" role="alert">
            <strong>{{ form[field].label }} </strong>: {{ errors[0]}}
        </div>
    {% endfor %}
{% endif %}

{% for message in get_flashed_messages() %}
    <div class="alert alert-danger" role="alert">
        {{message}}
    </div>
{% endfor %}
